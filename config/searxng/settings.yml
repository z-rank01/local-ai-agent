use_default_settings: true

general:
  instance_name: "Local AI Agent Search"
  debug: false

search:
  safe_search: 0
  default_lang: "auto"
  formats:
    - html
    - json

server:
  secret_key: "local-ai-agent-searxng-secret-key-change-me"
  limiter: false
  image_proxy: false

ui:
  static_use_hash: true

engines:
  # Bing — 国内可直连
  - name: bing
    engine: bing
    shortcut: bi
    disabled: false

  # DuckDuckGo — 备用
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  # Wikipedia — 知识查询
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false

  # Google — 需要代理，默认关闭
  - name: google
    engine: google
    shortcut: go
    disabled: true
