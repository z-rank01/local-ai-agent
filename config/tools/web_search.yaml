name: web_search
backend: skill-websearch
description: >
  搜索互联网获取实时信息。返回搜索结果列表，包含标题、链接和摘要。
  当用户询问最新资讯、实时数据、不确定的事实、或任何需要联网查询的问题时使用。
parameters:
  type: object
  properties:
    query:
      type: string
      description: "搜索关键词或问题，支持中英文"
    max_results:
      type: integer
      description: "最大返回结果数量（默认5，最大20）"
  required:
    - query
