name: skill_update
backend: skill-runner
description: |
  更新已注册技能的代码或元数据。可更新脚本代码、重新验证格式、重新安装依赖。
parameters:
  type: object
  properties:
    skill_name:
      type: string
      description: "技能名（不含 .py 后缀）"
    code:
      type: string
      description: "可选：新的技能代码。若提供则覆盖 /workspace/skills/{skill_name}.py"
    auto_install_deps:
      type: boolean
      description: "是否重新安装依赖（默认 true）"
  required:
    - skill_name
